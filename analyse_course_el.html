<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Analyse de course · Eau libre</title>
<style>
:root{
  --blue:#003087;--red:#C8102E;--gold:#b8860b;--green:#1a7a3c;
  --bg:#f4f7fb;--surf:#fff;--surf2:#eaf0f9;--surf3:#dce8f5;
  --border:#c8d8ea;--txt:#1a2a4a;--txt-dim:#5a7a9e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;}
.hdr{background:var(--blue);border-bottom:3px solid var(--red);padding:10px 20px 8px;
  position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;
  justify-content:space-between;gap:12px;flex-wrap:wrap;}
.hdr-left{display:flex;flex-direction:column;}
.hdr-title{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#fff;}
.hdr-sub{font-size:9px;color:rgba(255,255,255,.55);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.hdr-cond{font-size:9px;color:rgba(255,255,255,.65);margin-top:2px;font-style:italic;}
.hdr-controls{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;}
.tab{font-size:11px;font-weight:700;text-transform:uppercase;padding:5px 14px;border-radius:3px;
  border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.45);
  cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab.on{background:var(--red);border-color:var(--red);color:#fff;}
.course-sel{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);
  color:#fff;padding:5px 10px;border-radius:3px;font-size:11px;font-family:inherit;
  cursor:pointer;max-width:300px;}
.course-sel option{background:#003087;color:#fff;}
.vtabs{display:flex;background:var(--surf);border-bottom:2px solid var(--border);
  position:fixed;z-index:199;left:0;right:0;overflow-x:auto;scrollbar-width:none;}
.vtabs::-webkit-scrollbar{display:none;}
.vtab{flex-shrink:0;padding:9px 18px;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:var(--txt-dim);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
.vtab.on{color:var(--blue);border-bottom-color:var(--red);}
.vtab:hover:not(.on){color:var(--txt);background:var(--surf2);}
.main{display:flex;height:100%;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;}
.box{background:var(--surf);border:1px solid var(--border);border-radius:6px;
  padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,48,135,.06);}
.box h3{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);
  border-bottom:2px solid var(--blue);padding-bottom:5px;margin-bottom:8px;font-weight:700;}
.box-sub{font-size:9px;color:var(--txt-dim);margin-bottom:8px;font-style:italic;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:720px){.row2{grid-template-columns:1fr;}}
.slider-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.slider-lbl{font-size:10px;color:var(--txt-dim);font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
input[type=range]{accent-color:var(--blue);width:140px;cursor:pointer;}
.slider-val{font-size:11px;font-weight:700;color:var(--blue);min-width:30px;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.fb-label{font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.s-chip{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);
  background:var(--surf2);color:var(--txt-dim);cursor:pointer;transition:all .12s;}
.s-chip.on{color:#fff;border-color:currentColor;}
.focus-search{background:var(--surf2);border:1.5px solid var(--border);color:var(--txt);
  padding:7px 12px;border-radius:4px;font-size:12px;font-family:inherit;width:260px;}
.focus-search:focus{border-color:var(--blue);outline:none;}
.focus-result{background:var(--surf);border:1px solid var(--border);border-radius:4px;
  overflow:hidden;max-height:180px;overflow-y:auto;margin-top:4px;}
.focus-item{padding:7px 12px;cursor:pointer;font-size:11px;border-bottom:1px solid var(--border);}
.focus-item:hover{background:var(--surf2);}
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.sp{background:var(--surf2);border:1px solid var(--border);border-radius:4px;padding:8px 12px;text-align:center;min-width:70px;}
.sv{font-size:20px;font-weight:800;color:#0a1628;}.sl{font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-top:2px;}
.indice-table{width:100%;border-collapse:collapse;font-size:11px;}
.indice-table th{padding:5px 8px;background:var(--blue);color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;text-align:center;}
.indice-table th:nth-child(2){text-align:left;}
.indice-table td{padding:4px 8px;border-bottom:1px solid var(--border);text-align:center;}
.indice-table td:nth-child(2){text-align:left;}
.indice-table tr:nth-child(even) td{background:var(--surf2);}
.d-pos{color:var(--green);font-weight:700;}.d-neg{color:var(--red);font-weight:700;}.d-zero{color:#6b7f9e;}
/* Tooltip groupe */
#grp-tip{position:fixed;background:rgba(0,48,135,.95);color:#fff;padding:9px 13px;border-radius:6px;
  font-size:11px;line-height:1.55;pointer-events:none;z-index:1000;max-width:270px;
  box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;white-space:pre-line;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="hdr" id="hdr">
  <div class="hdr-left">
    <div class="hdr-title">🌊 Analyse de course · Eau libre 10km</div>
    <a href="index.html" style="display:inline-flex;align-items:center;gap:5px;color:rgba(255,255,255,.6);font-size:10px;text-decoration:none;padding:3px 8px;border:1px solid rgba(255,255,255,.2);border-radius:3px;margin-bottom:4px">← Accueil</a>
    <div class="hdr-sub">FFN · Centre de la Performance · 2021–2026</div>
    <div class="hdr-cond" id="hdr-cond"></div>
  </div>
  <div class="hdr-controls">
    <button class="tab on" id="btn-f" onclick="setGender('f')">♀ Femmes</button>
    <button class="tab" id="btn-h" onclick="setGender('h')">♂ Hommes</button>
    <select class="course-sel" id="course-sel" onchange="selectCourse(this.value)"></select>
  </div>
</div>
<div class="vtabs" id="vtabs">
  <div class="vtab on" data-v="groupes" onclick="selectView('groupes')">👥 Groupes</div>
  <div class="vtab" data-v="indice" onclick="selectView('indice')">📊 Indice EL</div>
  <div class="vtab" data-v="positions" onclick="selectView('positions')">📍 Positions</div>
  <div class="vtab" data-v="focus" onclick="selectView('focus')">🎯 Focus nageur</div>
</div>
<div class="main" id="main">
  <div class="content" id="content"></div>
</div>
<div id="grp-tip"></div>
<script>
'use strict';
fetch('https://raw.githubusercontent.com/PierreH-07/app-el/data/resultats_10km_el.json')
  .then(function(r){return r.json();})
  .then(function(json){
    const CF = json.CF;
    const CH = json.CH || {};
let G='f', COURSE=null, VIEW='groupes', SEL=[], FOCUS=null, TOP_N=15;
const COLORS=['#003087','#C8102E','#1a7a3c','#b8860b','#6b3090','#cd7c3a','#0077b6','#e76f51','#2a9d8f','#e9c46a'];

// Stockage tooltip : Map de rect_id → données groupe
const TIP_DATA = new Map();

function courses(){return G==='f'?CF:CH;}

window.setGender=setGender;
window.selectView=selectView;
window.selectCourse=selectCourse;
window.toggleSw=toggleSw;
window.selFocus=selFocus;
const _initAnalyse=()=>{
  setTop(); setGender('f');
  document.getElementById('content').addEventListener('mousemove', onContentMouseMove);
  document.getElementById('content').addEventListener('mouseleave', ()=>hideTip());
};
if(document.readyState==='loading'){
  window.addEventListener('load',_initAnalyse);
} else {
  _initAnalyse();
}
window.addEventListener('resize',()=>{setTop();renderAll();});

function onContentMouseMove(e){
  const el=e.target;
  if(el.dataset.tipId){
    const data=TIP_DATA.get(el.dataset.tipId);
    if(data){showTip(e,data);return;}
  }
  hideTip();
}

function showTip(e,data){
  const tip=document.getElementById('grp-tip');
  const membres=(data.membres||[]).join('\n');
  tip.textContent=`Tour ${data.t} — Groupe ${data.gi}\n${data.n} nageur(s) · Écart interne : ${data.ecart}s\n\n${membres}`;
  tip.style.display='block';
  moveTip(e);
}
function moveTip(e){
  const tip=document.getElementById('grp-tip');
  if(tip.style.display==='none')return;
  const x=Math.min(e.clientX+14, window.innerWidth-280);
  const y=Math.min(e.clientY+14, window.innerHeight-200);
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip(){document.getElementById('grp-tip').style.display='none';}
document.addEventListener('mousemove', e=>{
  const tip=document.getElementById('grp-tip');
  if(tip.style.display!=='none') moveTip(e);
});

function setGender(g){
  G=g; SEL=[]; FOCUS=null;
  document.getElementById('btn-f').className='tab'+(g==='f'?' on':'');
  document.getElementById('btn-h').className='tab'+(g==='h'?' on':'');
  buildCourseSelector();
  const keys=Object.keys(courses());
  if(keys.length) COURSE=keys[keys.length-1];
  renderAll();
}

function buildCourseSelector(){
  const sel=document.getElementById('course-sel');
  sel.innerHTML='';
  const groups={JO:[],CHM:[],CHE:[],CDM:[]};
  Object.entries(courses()).forEach(([k,c])=>{
    const t=c.type||'CDM';
    (groups[t]||groups.CDM).push([k,c]);
  });
  const labels={JO:'🏅 Jeux Olympiques',CHM:'🌍 Championnats du Monde',CHE:'🇪🇺 Championnats Europe',CDM:'🌊 Coupes du Monde'};
  ['JO','CHM','CHE','CDM'].forEach(t=>{
    if(!groups[t].length)return;
    const og=document.createElement('optgroup');
    og.label=labels[t];
    groups[t].sort((a,b)=>(b[1].date||'').localeCompare(a[1].date||'')).forEach(([k,c])=>{
      const o=document.createElement('option');
      o.value=k; o.textContent=c.label+(c.date?' ('+c.date.slice(-4)+')':'');
      if(k===COURSE) o.selected=true;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });
  updateCond();
}

function selectCourse(v){COURSE=v; SEL=[]; FOCUS=null; updateCond(); renderAll();}
function updateCond(){
  const c=courses()[COURSE];
  const el=document.getElementById('hdr-cond');
  if(el) el.textContent=c&&c.conditions?'🌊 '+c.conditions:'';
}

function selectView(v){
  VIEW=v;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));
  renderAll();
}

function setTop(){
  const hh=document.getElementById('hdr').offsetHeight;
  const vh=document.getElementById('vtabs').offsetHeight;
  document.getElementById('main').style.paddingTop=(hh+vh)+'px';
  document.getElementById('vtabs').style.top=hh+'px';
}


// DNF : nageur ayant complété moins de tours que la course
function dnfFilter(nageurs, nb_tours){
  if(!nb_tours) return nageurs;
  return nageurs.filter(function(ng){
    if(!ng.pos || ng.pos.length < nb_tours) return false;
    return ng.pos[nb_tours-1] != null;
  });
}
function isDNF(ng, nb_tours){
  if(!nb_tours) return false;
  return !ng.pos || ng.pos.length < nb_tours || ng.pos[nb_tours-1] == null;
}

function renderAll(){
  setTop();
  const c=courses()[COURSE];
  if(!c){document.getElementById('content').innerHTML='<div style="padding:40px;text-align:center;color:var(--txt-dim)">Aucune course</div>';return;}
  TIP_DATA.clear();
  if(VIEW==='groupes') renderGroupes(c);
  else if(VIEW==='indice') renderIndice(c);
  else if(VIEW==='positions') renderPositions(c);
  else if(VIEW==='focus') renderFocus(c);
}

// ─── GROUPES ─────────────────────────────────────────────────────
function renderGroupes(c){
  const tours=c.nb_tours, km=(c.dist_cumul||[]).map(d=>+(d/1000).toFixed(1));
  const nb=c.nb;

  // SVG groupes
  const W=620,H=240,padL=44,padT=28,padR=16,padB=30;
  const cw=W-padL-padR,ch=H-padT-padB;
  const xOf=i=>padL+(i/(tours-1))*cw;
  const allN=(c.groupes||[]).flat().map(g=>g.n);
  const maxN=Math.max(...allN,1);
  let tipId=0;

  let s1=`<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 ${W} ${H}">`;
  s1+=`<rect width="${W}" height="${H}" fill="var(--surf)"/>`;
  for(let t=0;t<tours;t++){
    const x=xOf(t);
    s1+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+ch}" stroke="var(--border)" stroke-width="0.7"/>`;
    s1+=`<text x="${x}" y="${H-10}" text-anchor="middle" font-size="9" fill="var(--txt-dim)">T${t+1}</text>`;
    if(km[t]) s1+=`<text x="${x}" y="${padT-6}" text-anchor="middle" font-size="8" fill="var(--txt-dim)">${km[t]}km</text>`;
  }
  for(let t=0;t<tours;t++){
    const grps=(c.groupes[t])||[];
    let y0=padT;
    grps.forEach((g,gi)=>{
      const h2=Math.max(4,(g.n/nb)*ch);
      const alpha=0.3+0.6*(g.n/maxN);
      const col=gi===0?`rgba(0,48,135,${alpha.toFixed(2)})`:`rgba(200,16,46,${(alpha*0.6).toFixed(2)})`;
      const tid='t'+tipId++;
      // Stocker données tooltip dans Map JS (pas dans attribut HTML)
      TIP_DATA.set(tid,{t:t+1,gi:gi+1,n:g.n,ecart:g.ecart_fin,membres:g.membres||[]});
      s1+=`<rect x="${(xOf(t)-18).toFixed(1)}" y="${y0.toFixed(1)}" width="36" height="${h2.toFixed(1)}" rx="2" fill="${col}" data-tip-id="${tid}" style="cursor:pointer"/>`;
      if(h2>12) s1+=`<text x="${xOf(t)}" y="${(y0+h2/2+4).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="white" pointer-events="none">${g.n}</text>`;
      y0+=h2+2;
    });
  }
  s1+=`<rect x="${padL}" y="${padT}" width="${cw}" height="${ch}" fill="none" stroke="var(--border)" stroke-width="0.8" rx="2"/>`;
  s1+='</svg>';

  // Attacher les events APRÈS injection (via delegation sur #content)
  // Les data-tip-id sont lus par onContentMouseMove → TIP_DATA

  // SVG écarts
  const W2=620,H2=220,pL2=44,pT2=20,pR2=16,pB2=30;
  const cw2=W2-pL2-pR2,ch2=H2-pT2-pB2;
  const xOf2=i=>pL2+(i/(tours-1))*cw2;
  let s2=`<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 ${W2} ${H2}">`;
  s2+=`<rect width="${W2}" height="${H2}" fill="var(--surf)"/>`;
  for(let t=0;t<tours;t++){
    s2+=`<line x1="${xOf2(t)}" y1="${pT2}" x2="${xOf2(t)}" y2="${pT2+ch2}" stroke="var(--border)" stroke-width="0.7"/>`;
    s2+=`<text x="${xOf2(t)}" y="${H2-10}" text-anchor="middle" font-size="9" fill="var(--txt-dim)">T${t+1}</text>`;
  }
  const linesDefs=[[2,'rgba(180,140,0,.9)','Top 3'],[9,'rgba(0,48,135,.85)','Top 10'],[24,'rgba(200,16,46,.65)','Top 25']];
  const sorted=[...dnfFilter(c.nageurs, c.nb_tours)].sort((a,b)=>a.rang-b.rang);
  const allE=linesDefs.flatMap(([idx])=>sorted[idx]?.ecart||[]).filter(v=>v!=null&&v>0);
  const maxE=Math.max(...allE,1);
  const yE=v=>pT2+ch2-(v/maxE)*ch2;
  linesDefs.forEach(([idx,col,lbl])=>{
    const pts=[];
    for(let t=0;t<tours;t++){
      const v=sorted[idx]?.ecart?.[t];
      if(v!=null) pts.push([xOf2(t),yE(v),v]);
    }
    if(pts.length<2)return;
    s2+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="none" stroke="${col}" stroke-width="2"/>`;
    pts.forEach(([x,y,v])=>{
      s2+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${col}"/>`;
      s2+=`<text x="${x.toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-size="8" fill="${col}">${v.toFixed(1)}s</text>`;
    });
  });
  [0,maxE/2,maxE].forEach(v=>{
    const y=yE(v);
    s2+=`<line x1="${pL2}" y1="${y.toFixed(1)}" x2="${pL2+cw2}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.4" stroke-dasharray="2,3"/>`;
    s2+=`<text x="${pL2-3}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="8" fill="var(--txt-dim)">${v.toFixed(0)}s</text>`;
  });
  s2+=`<rect x="${pL2}" y="${pT2}" width="${cw2}" height="${ch2}" fill="none" stroke="var(--border)" stroke-width="0.8" rx="2"/>`;
  s2+='</svg>';

  const leg1=`<div style="display:flex;gap:14px;font-size:9px;margin-top:6px;flex-wrap:wrap">
    <span style="color:rgba(0,48,135,.9)">█ Groupe de tête</span>
    <span style="color:rgba(200,16,46,.65)">█ Groupes suivants</span>
    <span style="color:var(--txt-dim);font-style:italic">🖱 Survoler les blocs pour voir la composition</span>
  </div>`;
  const leg2=`<div style="display:flex;gap:14px;font-size:9px;margin-top:6px;flex-wrap:wrap">
    <span style="color:rgba(180,140,0,.9)">━━ Top 3</span>
    <span style="color:rgba(0,48,135,.85)">━━ Top 10</span>
    <span style="color:rgba(200,16,46,.7)">━━ Top 25</span>
  </div>`;

  document.getElementById('content').innerHTML=`
  <div class="box"><h3>👥 Taille des groupes par tour</h3>
    <div class="box-sub">Hauteur proportionnelle au nombre de nageurs · Survoler pour voir la composition</div>
    ${s1}${leg1}</div>
  <div class="box"><h3>⏱ Écart cumulé sur le leader</h3>${s2}${leg2}</div>`;

  // Après injection du HTML, attacher les data-tip-id via querySelectorAll
  // (la délégation sur #content lit dataset.tipId)
  document.querySelectorAll('[data-tip-id]').forEach(el=>{
    el.dataset.tipId=el.getAttribute('data-tip-id');
  });
}

// ─── INDICE ───────────────────────────────────────────────────────
function renderIndice(c){
  const valid=dnfFilter(c.nageurs, c.nb_tours).filter(n=>n.rv!=null);
  if(!valid.length){
    document.getElementById('content').innerHTML='<div class="box" style="padding:40px;text-align:center;color:var(--txt-dim)">Données de vitesse piscine non disponibles.</div>';
    return;
  }
  const n=valid.length;
  const W=480,H=320,pad=48;
  const cw=W-pad*2,ch=H-pad*2;
  const xOf=v=>pad+(v-1)/(n-1)*cw;
  const yOf=v=>pad+(v-1)/(n-1)*ch;

  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 ${W} ${H}">`;
  svg+=`<rect width="${W}" height="${H}" fill="var(--surf)"/>`;
  svg+=`<line x1="${pad}" y1="${pad}" x2="${pad+cw}" y2="${pad+ch}" stroke="rgba(0,48,135,.2)" stroke-width="1.5" stroke-dasharray="5,3"/>`;
  valid.forEach(ng=>{
    const x=xOf(ng.rv),y=yOf(ng.rang);
    const di=ng.di||0;
    const col=di>3?'var(--green)':di<-3?'var(--red)':'#6b7f9e';
    const isFR=ng.noc==='FRA';
    svg+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isFR?5.5:4}" fill="${col}" stroke="${isFR?'#003087':'none'}" stroke-width="${isFR?2:0}" opacity="0.85"/>`;
    if(ng.rang<=5||isFR||Math.abs(di)>=8){
      const lbl=ng.nom.split(' ')[0].substring(0,12);
      svg+=`<text x="${(x+7).toFixed(1)}" y="${(y+4).toFixed(1)}" font-size="8" fill="${isFR?'var(--blue)':col}" font-weight="${isFR?700:400}">${isFR?'🇫🇷 ':''}${lbl}</text>`;
    }
  });
  svg+=`<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${pad+ch}" stroke="var(--border)" stroke-width="1"/>`;
  svg+=`<line x1="${pad}" y1="${pad+ch}" x2="${pad+cw}" y2="${pad+ch}" stroke="var(--border)" stroke-width="1"/>`;
  svg+=`<text x="${pad+cw/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="var(--txt-dim)">Rang vitesse piscine (1500m)</text>`;
  svg+=`<text transform="rotate(-90,12,${pad+ch/2})" x="12" y="${pad+ch/2+4}" text-anchor="middle" font-size="9" fill="var(--txt-dim)">Classement final course</text>`;
  svg+='</svg>';

  const sorted=[...valid].sort((a,b)=>(b.di||0)-(a.di||0));
  const rows=sorted.map(n=>{
    const di=n.di||0;
    const cls=di>0?'d-pos':di<0?'d-neg':'d-zero';
    return `<tr><td>${n.rang}</td><td>${n.noc==='FRA'?'🇫🇷 ':''}<b>${n.nom}</b></td><td>${n.noc}</td><td>${n.rv||'—'}</td><td class="${cls}">${di>0?'+':''}${di}</td></tr>`;
  }).join('');

  const leg=`<div style="display:flex;gap:14px;font-size:9px;margin-top:6px;flex-wrap:wrap">
    <span style="color:var(--green)">● Profil eau libre</span>
    <span style="color:var(--red)">● Profil piscine</span>
    <span style="color:#6b7f9e">● Neutre</span>
    <span style="color:var(--blue);font-weight:700">○ Français(e)</span>
  </div>`;

  document.getElementById('content').innerHTML=`<div class="row2">
    <div class="box"><h3>📈 Rang vitesse vs classement course</h3>
      <div class="box-sub">Diagonale = indice 0 · Au-dessus = profil eau libre · En-dessous = profil piscine</div>
      ${svg}${leg}</div>
    <div class="box"><h3>📋 Classement par indice</h3>
      <div class="box-sub">Indice = rang vitesse − rang course · Positif = meilleur en course</div>
      <div style="max-height:360px;overflow-y:auto">
      <table class="indice-table"><thead><tr><th>#</th><th>Nageur</th><th>NOC</th><th>Rg vitesse</th><th>Indice</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div></div>`;
}

// ─── POSITIONS avec slider ────────────────────────────────────────
function renderPositions(c){
  const tours=c.nb_tours, km=(c.dist_cumul||[]).map(d=>+(d/1000).toFixed(1));
  const nb=c.nb, topN=Math.min(TOP_N,nb);
  const hasSel=SEL.length>0;
  const finishers=dnfFilter(c.nageurs, c.nb_tours);
  const toShow=hasSel?SEL.map(i=>({i,n:finishers[i]})):finishers.slice(0,topN).map((n,i)=>({i,n}));

  const chips=finishers.slice(0,Math.min(25,nb)).map((n,i)=>{
    const on=SEL.includes(i);
    const col=COLORS[SEL.indexOf(i)%COLORS.length]||'var(--txt-dim)';
    return `<span class="s-chip${on?' on':''}" style="${on?'border-color:'+col+';color:'+col+';background:rgba(0,0,0,.05)':''}" onclick="toggleSw(${i})">${n.nom.split(' ')[0].substring(0,10)}</span>`;
  }).join('');

  const W=620,H=300,padL=32,padR=16,padT=16,padB=30;
  const cw=W-padL-padR,ch=H-padT-padB;
  const xOf=t=>padL+(t/(tours-1))*cw;
  const yOf=r=>padT+((r-1)/(nb-1))*ch;

  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 ${W} ${H}">`;
  svg+=`<rect width="${W}" height="${H}" fill="var(--surf)"/>`;
  [1,5,10,Math.round(nb/2),nb].filter(r=>r>=1&&r<=nb).forEach(r=>{
    const y=yOf(r);
    svg+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${padL+cw}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.6" stroke-dasharray="2,3"/>`;
    svg+=`<text x="${padL-3}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="7" fill="var(--txt-dim)">${r}</text>`;
  });
  for(let t=0;t<tours;t++){
    svg+=`<line x1="${xOf(t).toFixed(1)}" y1="${padT}" x2="${xOf(t).toFixed(1)}" y2="${padT+ch}" stroke="var(--border)" stroke-width="0.5"/>`;
    svg+=`<text x="${xOf(t).toFixed(1)}" y="${H-10}" text-anchor="middle" font-size="8" fill="var(--txt-dim)">T${t+1}</text>`;
    if(km[t]) svg+=`<text x="${xOf(t).toFixed(1)}" y="${padT-4}" text-anchor="middle" font-size="7" fill="var(--txt-dim)">${km[t]}km</text>`;
  }
  toShow.forEach(({i,n},si)=>{
    const col=COLORS[si%COLORS.length];
    const isFR=n.noc==='FRA';
    const pts=(n.pos||[]).map((r,t)=>r!=null?[xOf(t),yOf(r)]:null).filter(Boolean);
    if(pts.length<2)return;
    const sw=hasSel&&SEL.includes(i)?2.5:1.2;
    svg+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="none" stroke="${col}" stroke-width="${sw}" opacity="0.85"/>`;
    pts.forEach(([x,y])=>svg+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${sw>1.5?3.5:2}" fill="${col}"/>`);
    const lp=pts[pts.length-1];
    svg+=`<text x="${(lp[0]+5).toFixed(1)}" y="${(lp[1]+3).toFixed(1)}" font-size="${isFR?9:8}" fill="${col}" font-weight="${isFR?700:400}">${isFR?'🇫🇷 ':''}${n.rang}e</text>`;
  });
  svg+=`<rect x="${padL}" y="${padT}" width="${cw}" height="${ch}" fill="none" stroke="var(--border)" stroke-width="0.8" rx="2"/>`;
  svg+='</svg>';

  document.getElementById('content').innerHTML=`<div class="box">
    <h3>📍 Évolution des positions tour par tour</h3>
    <div class="slider-wrap">
      <span class="slider-lbl">Top N :</span>
      <input type="range" min="3" max="${Math.min(nb,50)}" value="${topN}" id="sl"
        oninput="TOP_N=+this.value;document.getElementById('slv').textContent=this.value;renderPositions(courses()[COURSE])">
      <span class="slider-val" id="slv">${topN}</span>
    </div>
    <div class="filter-bar"><span class="fb-label">Sélection :</span><div style="display:flex;gap:4px;flex-wrap:wrap">${chips}</div>
      ${hasSel?`<button onclick="SEL=[];renderPositions(courses()[COURSE])" style="font-size:10px;padding:3px 8px;border:1px solid var(--border);border-radius:3px;background:var(--surf);cursor:pointer">✕ Reset</button>`:''}
    </div>
    <div style="font-size:9px;color:var(--txt-dim);margin-bottom:8px">${hasSel?SEL.length+' sélectionné(s)':'Top '+topN+' affiché · Cliquer sur un nom pour sélectionner'}</div>
    ${svg}</div>`;
}

function toggleSw(i){
  const idx=SEL.indexOf(i);
  if(idx>=0) SEL.splice(idx,1);
  else if(SEL.length<10) SEL.push(i);
  renderPositions(courses()[COURSE]);
}

// ─── FOCUS NAGEUR ────────────────────────────────────────────────
function renderFocus(c){
  const ng=FOCUS?c.nageurs.find(n=>n.nom===FOCUS):null;
  const searchHtml=`<div class="filter-bar"><span class="fb-label">Nageur :</span>
    <div style="position:relative">
      <input class="focus-search" id="fi" placeholder="Chercher…" value="${ng?ng.nom:''}" oninput="filterFocus(this.value)">
      <div class="focus-result" id="fl" style="display:none;position:absolute;z-index:10;width:100%;"></div>
    </div></div>`;

  if(!ng){
    document.getElementById('content').innerHTML=`<div class="box"><h3>🎯 Focus nageur</h3>${searchHtml}<div style="text-align:center;padding:40px;color:var(--txt-dim)">Sélectionner un nageur</div></div>`;
    return;
  }

  const tours=c.nb_tours, nb=c.nb, km=(c.dist_cumul||[]).map(d=>+(d/1000).toFixed(1));
  const leader=c.nageurs[0];
  const W=580,H=180,padL=40,padR=12,padT=14,padB=28,cw=W-padL-padR,ch=H-padT-padB;
  const xOf=t=>padL+(t/(tours-1))*cw;

  const allV=[...(ng.vit||[]),...(leader.vit||[])].filter(v=>v!=null&&isFinite(v));
  const vMin=Math.max(1.2,Math.min(...allV)-0.05), vMax=Math.min(2.0,Math.max(...allV)+0.05);
  const yV=v=>padT+ch-((v-vMin)/(vMax-vMin))*ch;

  let svgV=`<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="var(--surf)"/>`;
  [[ng,'rgba(0,48,135,.9)'],[leader,'rgba(180,140,0,.8)']].forEach(([sw,col])=>{
    const pts=(sw.vit||[]).map((v,t)=>v!=null&&isFinite(v)?[xOf(t),yV(v)]:null).filter(Boolean);
    if(pts.length<2)return;
    svgV+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="none" stroke="${col}" stroke-width="2"/>`;
    pts.forEach(([x,y])=>svgV+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${col}"/>`);
  });
  [vMin,(vMin+vMax)/2,vMax].forEach(v=>{
    const y=yV(v);
    svgV+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${padL+cw}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,2"/>`;
    svgV+=`<text x="${padL-3}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="8" fill="var(--txt-dim)">${v.toFixed(2)}</text>`;
  });
  for(let t=0;t<tours;t++) svgV+=`<text x="${xOf(t).toFixed(1)}" y="${H-10}" text-anchor="middle" font-size="8" fill="var(--txt-dim)">T${t+1}</text>`;
  svgV+=`<rect x="${padL}" y="${padT}" width="${cw}" height="${ch}" fill="none" stroke="var(--border)" stroke-width="0.8" rx="2"/>`;
  svgV+='</svg>';

  const H2=210, ch2=H2-padT-padB;
  const yP=r=>padT+((r-1)/(nb-1))*ch2;
  const ecarts=(ng.ecart||[]).filter(v=>v!=null&&v>0);
  const maxE=Math.max(...ecarts,1);
  let svgP=`<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 ${W} ${H2}"><rect width="${W}" height="${H2}" fill="var(--surf)"/>`;
  [1,5,10,nb].filter(r=>r>=1&&r<=nb).forEach(r=>{
    const y=yP(r);
    svgP+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${padL+cw}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,3"/>`;
    svgP+=`<text x="${padL-3}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="7" fill="var(--txt-dim)">${r}</text>`;
  });
  const ppts=(ng.pos||[]).map((r,t)=>r!=null?[xOf(t),yP(r)]:null).filter(Boolean);
  if(ppts.length>=2){
    svgP+=`<polyline points="${ppts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="none" stroke="rgba(0,48,135,.9)" stroke-width="2.5"/>`;
    (ng.pos||[]).forEach((r,t)=>{
      if(r==null)return;
      const col=r===1?'var(--gold)':r<=3?'var(--red)':r<=10?'var(--blue)':'var(--txt-dim)';
      svgP+=`<circle cx="${xOf(t).toFixed(1)}" cy="${yP(r).toFixed(1)}" r="4" fill="${col}" stroke="white" stroke-width="1"/>`;
      svgP+=`<text x="${xOf(t).toFixed(1)}" y="${(yP(r)-7).toFixed(1)}" text-anchor="middle" font-size="8" fill="${col}" font-weight="700">${r}e</text>`;
    });
  }
  (ng.ecart||[]).forEach((e,t)=>{
    if(!e||e<=0)return;
    const bh=Math.max(2,(e/maxE)*20);
    svgP+=`<rect x="${(xOf(t)-6).toFixed(1)}" y="${(H2-padB-bh).toFixed(1)}" width="12" height="${bh.toFixed(1)}" fill="rgba(200,16,46,.45)" rx="1"/>`;
    svgP+=`<text x="${xOf(t).toFixed(1)}" y="${H2-padB+10}" text-anchor="middle" font-size="7" fill="rgba(200,16,46,.8)">${e.toFixed(0)}s</text>`;
  });
  for(let t=0;t<tours;t++) svgP+=`<text x="${xOf(t).toFixed(1)}" y="${H2-4}" text-anchor="middle" font-size="8" fill="var(--txt-dim)">T${t+1}</text>`;
  svgP+=`<rect x="${padL}" y="${padT}" width="${cw}" height="${ch2}" fill="none" stroke="var(--border)" stroke-width="0.8" rx="2"/>`;
  svgP+='</svg>';

  const avgPos=(ng.pos||[]).filter(p=>p!=null);
  const bestPos=Math.min(...avgPos), worstPos=Math.max(...avgPos);
  const di=ng.di||0;
  const lastEcart=(ng.ecart||[]).filter(v=>v!=null).slice(-1)[0];

  document.getElementById('content').innerHTML=`<div class="box">
    <h3>🎯 Focus : ${ng.nom} <span style="color:var(--txt-dim);font-size:9px;font-weight:400">${ng.noc} · Rang : ${ng.rang}e/${nb}</span></h3>
    ${searchHtml}
    <div class="stats-row" style="margin-top:10px">
      <div class="sp"><div class="sv">${ng.rang}e</div><div class="sl">Classement</div></div>
      <div class="sp"><div class="sv" style="color:var(--green)">${bestPos}e</div><div class="sl">Meilleure pos.</div></div>
      <div class="sp"><div class="sv" style="color:var(--red)">${worstPos}e</div><div class="sl">Pire pos.</div></div>
      ${di!==0?`<div class="sp"><div class="sv" style="color:${di>3?'var(--green)':di<-3?'var(--red)':''}">${di>0?'+':''}${di}</div><div class="sl">Indice EL</div></div>`:''}
      ${lastEcart?`<div class="sp"><div class="sv" style="color:var(--red)">${lastEcart.toFixed(1)}s</div><div class="sl">Écart leader</div></div>`:''}
    </div></div>
  <div class="row2">
    <div class="box"><h3>⚡ Vitesses (m/s)</h3>
      <div class="box-sub" style="display:flex;gap:14px;font-size:9px">
        <span style="color:rgba(0,48,135,.9)">━━ ${ng.nom.split(' ')[0]}</span>
        <span style="color:rgba(180,140,0,.8)">━━ ${leader.nom.split(' ')[0]} (1er)</span>
      </div>${svgV}</div>
    <div class="box"><h3>📍 Position + écart leader</h3>
      <div class="box-sub">Ligne = position · Barres = retard en secondes</div>${svgP}</div>
  </div>`;
}

function filterFocus(q){
  const c=courses()[COURSE]; if(!c)return;
  const fl=document.getElementById('fl');
  const matches=c.nageurs.filter(n=>n.nom.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(!matches.length||!q){fl.style.display='none';return;}
  fl.style.display='block';
  fl.innerHTML=matches.map(n=>`<div class="focus-item" onclick="selFocus('${n.nom.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${n.nom} <span style="color:var(--txt-dim)">${n.noc} · ${n.rang}e</span></div>`).join('');
}
function selFocus(nom){FOCUS=nom;document.getElementById('fi').value=nom;document.getElementById('fl').style.display='none';renderFocus(courses()[COURSE]);}
  })
  .catch(function(e){
    document.body.innerHTML='<p style="color:red;padding:2rem">Erreur chargement données : '+e+'</p>';
  });
</script>
</body>
</html>
